<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles — The Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;600;700;900&display=swap">
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="../assets/filters.css">
</head>
<body data-page="articles">
  <nav class="site-nav">
    <a href="../index.html" class="nav-brand">The Portfolio</a>
    <div class="nav-right">
      <div class="nav-links">
        <a href="index.html" class="nav-link active">
          <span data-lang-en>Articles</span>
          <span data-lang-zh>文章</span>
        </a>
        <a href="../reports/index.html" class="nav-link">
          <span data-lang-en>Reports</span>
          <span data-lang-zh>报告</span>
        </a>
        <a href="../about.html" class="nav-link">
          <span data-lang-en>About</span>
          <span data-lang-zh>关于</span>
        </a>
      </div>
      <div class="lang-toggle">
        <button data-lang-target="en">EN</button>
        <button data-lang-target="zh">中文</button>
      </div>
    </div>
  </nav>

  <main>
    <h1 class="page-title">
      <span data-lang-en>Articles</span>
      <span data-lang-zh>文章</span>
    </h1>
    <p class="page-subtitle">
      <span data-lang-en>Essays, notes, and reflections.</span>
      <span data-lang-zh>随笔、札记与思考。</span>
    </p>

    <div id="list" class="list"></div>
  </main>

  <footer class="site-footer">
    <p>
      <span data-lang-en>© 2026 The Portfolio.</span>
      <span data-lang-zh>© 2026 The Portfolio.</span>
    </p>
  </footer>

  <script src="../assets/app.js"></script>
  <script>
    // Page-specific filter config — consumed by filters.js on `load`.
    window.PortfolioFiltersInit = window.PortfolioFiltersInit || [];
    window.PortfolioFiltersInit.push({
      page: 'articles',
      kind: 'article',
      manifestPath: 'articles.json',
      listSelector: '#list',
      axes: {
        primary: {
          key: 'track',
          label: 'Track',
          items: ['i', 'ii'],
          valueMap: { i: '赛道一', ii: '赛道二' },
          labels: { i: 'Track I', ii: 'Track II' }
        },
        secondary: {
          key: 'tag',
          label: 'Tag',
          sourceField: 'tags'
          // no dependsOn — tag row is always visible
        }
      }
    });
  </script>
  <script src="../assets/filters.js" defer></script>
</body>
</html>
